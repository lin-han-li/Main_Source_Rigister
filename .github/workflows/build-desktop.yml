name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux packaging tools
        if: matrix.target == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          NFP_URL="$(python - <<'PY'
          import json
          import urllib.request

          request = urllib.request.Request(
              "https://api.github.com/repos/goreleaser/nfpm/releases/latest",
              headers={
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "main-source-rigister-release",
              },
          )
          with urllib.request.urlopen(request) as response:
              release = json.load(response)

          asset = next(
              candidate
              for candidate in release["assets"]
              if candidate["name"].endswith("_amd64.deb")
          )
          print(asset["browser_download_url"])
          PY
          )"
          curl -fsSL "$NFP_URL" -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: Install Inno Setup
        if: matrix.target == 'win'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Verify desktop release pipeline
        run: npm run verify:desktop

      - name: Build platform package
        run: npm run dist:${{ matrix.target }} -- --skip-verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: dist/releases/${{ matrix.target }}/**/*
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.dmg
            release-assets/**/*.tar.gz
          generate_release_notes: true
