name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux packaging tools
        if: matrix.target == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.40.1/nfpm_2.40.1_Linux_x86_64.tar.gz -o /tmp/nfpm.tar.gz
          mkdir -p /tmp/nfpm-extract
          tar -xzf /tmp/nfpm.tar.gz -C /tmp/nfpm-extract
          chmod +x /tmp/nfpm-extract/nfpm
          sudo install /tmp/nfpm-extract/nfpm /usr/local/bin/nfpm

      - name: Install Inno Setup
        if: matrix.target == 'win'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Verify desktop release pipeline
        run: npm run verify:desktop

      - name: Build platform package
        run: npm run dist:${{ matrix.target }} -- --skip-verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: dist/releases/${{ matrix.target }}/**/*
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.dmg
            release-assets/**/*.tar.gz
          generate_release_notes: true
